<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>개인 일정</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <header class="bg-gray-400 p-4">
        <h1 class="text-3xl font-bold">Constant</h1>
    </header>

    <main class="flex justify-center p-8">

        <div class="w-full max-w-2xl bg-white rounded-2xl shadow p-6">

            <!-- 상단 -->
            <div class="relative mb-6">

                <a href="/my_schedule" class="absolute left-0 top-1/2 -translate-y-1/2 text-2xl">
                    &lt;
                </a>

                <h1 class="text-2xl font-bold text-center">
                    {{ schedule.title }}
                </h1>

            </div>

            <!-- 정보 박스 -->
            <div class="border rounded-xl p-4 space-y-4">

                <!-- 일정 -->
                <p>
                    <span class="font-bold">일정:</span>

                    {% if schedule.end and schedule.end != schedule.start %}
                    {{ schedule.start }} ~ {{ schedule.end }}
                    {% else %}
                    {{ schedule.start }}
                    {% endif %}
                </p>

                <!-- 내용 -->
                <p>
                    <span class="font-bold">내용:</span>
                    {{ schedule.description }}
                </p>

            </div>

        </div>

    </main>

</body>

</html>
