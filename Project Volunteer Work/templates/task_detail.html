<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
{% extends "base.html" %}
{% block content %}
<div class="w-full max-w-2xl bg-white rounded-2xl shadow p-6">

    <!-- 상단 제목 + 좌우 버튼 -->
    <div class="relative mb-6">

        <!-- 🔙 뒤로가기 (왼쪽 고정) -->
        <a href="/{{ prev }}" class="absolute left-0 top-1/2 -translate-y-1/2 text-2xl">
            &lt;
        </a>

        <!-- 🏷 제목 (정중앙) -->
        <h1 class="text-2xl font-bold text-center">
            {{ task.title }}
        </h1>

    </div>

    <!-- 정보 박스 -->
    <div class="border rounded-xl p-4 space-y-3">

        <div class="flex gap-4">
            <p><span class="font-bold">과목:</span> {{ task.subject }}</p>
            <p><span class="font-bold">코드:</span> {{ task.id }}</p>
            <p><span class="font-bold">학급:</span> {{ task.grade }}-{{ task.class }}</p>
        </div>

        <p><span class="font-bold">기간:</span> {{ task.date }}</p>

        <p><span class="font-bold">내용:</span> {{ task.context }}</p>

        <!-- 이미지 영역 -->
        <div class="mt-4 border rounded-lg h-64 flex items-center justify-center bg-gray-100">

            {% if task.img %}
            <img src="{{ task.img }}" class="max-h-full rounded">
            {% else %}
            <p class="text-gray-500">해당 이미지가 없습니다.</p>
            {% endif %}

        </div>

    </div>

</div>
{% endblock %}
