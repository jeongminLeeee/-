<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">✏️ 수행평가 안내</h1>

<!-- 필터 -->
<div class="flex flex-wrap items-center gap-3 mb-6">

    <!-- 학년 -->
    <select id="gradeFilter" class="border px-3 py-2 rounded">
        <option value="전체">학년</option>
        <option value="1">1학년</option>
        <option value="2">2학년</option>
    </select>

    <!-- 검색 기준 -->
    <select id="searchType" class="border px-3 py-2 rounded">
        <option value="subject">과목</option>
        <option value="title">이름</option>
        <option value="class">반</option>
    </select>

    <!-- 검색창 -->
    <input id="searchInput" type="text" placeholder="검색..." class="border px-3 py-2 rounded w-48">

    <!-- 오른쪽 정렬 -->
    <div class="ml-auto">
        <select id="sortSelect" class="border px-3 py-2 rounded">
            <option value="">최신 등록순</option>
            <option value="deadline">마감 임박순</option>
            <option value="name">이름순</option>
        </select>
    </div>

</div>

<!-- 리스트 -->
<div class="space-y-4">
    {% if tasks|length == 0 %}
    <p class="text-gray-500">등록된 수행평가가 없습니다.</p>
    {% endif %}

    {% for t in tasks %}
    <div class="task-item bg-white p-5 rounded-2xl shadow flex justify-between items-center"
        data-subject="{{ t.subject }}" data-title="{{ t.title }}" data-class="{{ t.class }}" data-grade="{{ t.grade }}"
        data-dday="{{ t.d_day }}">

        <div>
            <h2 class="text-lg font-bold">{{ t.title }}</h2>
            <p class="text-gray-500">{{ t.grade }}학년 {{ t.class }}반</p>

            <p class="
            {% if t.d_day <= 1 %} text-red-500
            {% elif t.d_day <= 3 %} text-orange-500
            {% else %} text-gray-600
            {% endif %}
            ">
                D-{{ t.d_day }}
            </p>

            <p class="login-msg text-red-500 text-sm"></p>
        </div>

        <div class="flex gap-2">
            <a href="/task/{{ t.id }}?from=tasks">
                <button class="bg-gray-300 px-3 py-1 rounded">
                    자세히 보기
                </button>
            </a>
            <button onclick="toggleCalendar({{ t.id }}, this)" data-id="{{ t.id }}"
                class="calendar-btn bg-green-500 text-white px-3 py-1 rounded">
                캘린더 추가
            </button>
        </div>

    </div>
    {% endfor %}
</div>
{% endblock %}
{% block script %}
<script>
    let userTasks = [];

    // 🔥 요소 가져오기
    const gradeFilter = document.getElementById("gradeFilter");
    const searchType = document.getElementById("searchType");
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");

    const container = document.querySelector(".space-y-4");

    // 🔥 유저 캘린더 상태 불러오기
    fetch("/get_user_tasks")
        .then(res => res.json())
        .then(data => {
            userTasks = data.tasks;
            let userTaskIds = userTasks.map(t => t.id.toString());

            document.querySelectorAll(".calendar-btn").forEach(btn => {
                let id = btn.dataset.id;
                if (userTaskIds.includes(id)) {
                    btn.innerText = "추가 취소";
                    btn.classList.remove("bg-green-500");
                    btn.classList.add("bg-red-500");
                }
            });
        });

    // 🔥 캘린더 토글
    function toggleCalendar(taskId, btn) {
        if (btn.innerText === "캘린더 추가") {
            fetch("/add_task", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ task_id: taskId })
            })
                .then(res => {
                    if (res.status === 401) { showLoginMessage(btn); return null; }
                    return res.json();
                })
                .then(data => {
                    if (!data) return;
                    btn.innerText = "추가 취소";
                    btn.classList.remove("bg-green-500");
                    btn.classList.add("bg-red-500");
                });
        } else {
            fetch("/remove_task", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ task_id: taskId })
            });

            btn.innerText = "캘린더 추가";
            btn.classList.remove("bg-red-500");
            btn.classList.add("bg-green-500");
        }
    }

    function showLoginMessage(btn) {
        let msg = btn.parentElement.parentElement.querySelector(".login-msg");
        msg.innerText = "로그인 후 이용하시오";
        setTimeout(() => { msg.innerText = ""; }, 2000);
    }

    // 🔥 필터 + 검색 + 정렬
    function filterTasks() {
        const items = document.querySelectorAll(".task-item");

        const grade = gradeFilter.value;
        const type = searchType.value;
        const keyword = searchInput.value.toLowerCase();

        items.forEach(item => {
            let match = true;

            // 학년 필터
            if (grade !== "전체" && item.dataset.grade !== grade) {
                match = false;
            }

            // 검색 필터
            if (keyword) {
                const value = (item.dataset[type] || "").toLowerCase();
                if (!value.includes(keyword)) {
                    match = false;
                }
            }

            item.style.display = match ? "flex" : "none";
        });

        sortTasks();
    }

    function sortTasks() {
        const items = Array.from(document.querySelectorAll(".task-item"));

        const type = sortSelect.value;

        const sorted = items.sort((a, b) => {
            if (type === "deadline") {
                return Number(a.dataset.dday) - Number(b.dataset.dday);
            }
            if (type === "name") {
                return a.dataset.title.localeCompare(b.dataset.title);
            }
            return 0;
        });

        sorted.forEach(el => container.appendChild(el));
    }

    // 🔥 이벤트 연결 (실시간)
    gradeFilter.addEventListener("change", filterTasks);
    searchType.addEventListener("change", filterTasks);
    searchInput.addEventListener("input", filterTasks);
    sortSelect.addEventListener("change", filterTasks);
</script>
{% endblock %}
