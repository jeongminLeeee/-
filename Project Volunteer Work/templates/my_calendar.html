<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constant - 나의 캘린더</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <style>
        /* 🔥 날짜 + 공휴일 구조 강제 고정 */
        .fc .fc-daygrid-day-top {
            display: flex !important;
            flex-direction: column !important;
            align-items: flex-start !important;
            gap: 2px !important;
        }

        /* 🔥 날짜 숫자 줄 안 깨지게 */
        .fc .fc-daygrid-day-number {
            line-height: 1.2;
        }

        /* 🔥 공휴일 텍스트 */
        .holiday-name {
            display: block;
            font-size: 0.65rem;
            color: #b91c1c;
            line-height: 1.2;
            margin-top: 2px;
            word-break: keep-all;
            white-space: normal;
            /* 🔥 줄바꿈 허용 */
        }

        /* 다른 달 */
        .fc-day-other .holiday-name {
            opacity: 0.4;
        }

        /* 오늘 */
        .today {
            background-color: #fef3c7 !important;
            border-radius: 0.5rem;
        }

        /* 일정 */
        .fc-event {
            background-color: #3b82f6;
            border: none;
            border-radius: 6px;
            padding: 2px;
            font-size: 0.8rem;
        }

        /* 전체 크기 */
        .fc {
            width: 100% !important;
        }
    </style>
</head>

<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <header class="bg-gray-400 shadow-sm p-4 flex justify-between items-center">
        <h1 class="text-3xl font-bold">Constant</h1>
    </header>

    <div class="flex relative">

        <!-- 🔥 사이드바 -->
        <aside id="sidebar"
            class="w-64 bg-white p-4 shadow-md h-screen transition-all duration-300 ease-in-out relative">

            <!-- ✅ 중앙 버튼 -->
            <button onclick="toggleSidebar()"
                class="absolute -right-4 top-1/2 -translate-y-1/2 bg-gray-400 hover:bg-gray-600 text-white w-8 h-12 rounded-md text-sm flex items-center justify-center shadow transition">
                ‹‹
            </button>

            <div id="sidebarContent">
                <div class="flex flex-col items-center gap-3 mt-3">
                    {% if session.get("user") %}
                    <div class="w-20 h-20 bg-gray-300 rounded-full"></div>
                    <p class="font-semibold">{{ session["user"] }}</p>
                    <a href="/logout">
                        <button class="bg-red-500 text-white px-6 py-2 rounded-lg w-40">
                            로그아웃
                        </button>
                    </a>
                    {% else %}
                    <a href="/login">
                        <button class="bg-blue-500 text-white px-6 py-2 rounded-lg w-40">
                            로그인
                        </button>
                    </a>
                    <a href="/signup">
                        <button class="bg-gray-200 px-6 py-2 rounded-lg w-40">
                            회원가입
                        </button>
                    </a>
                    {% endif %}
                </div>

                <nav class="mt-6 border-t border-gray-400 pt-4">
                    <ul class="space-y-3 text-gray-700">
                        <a href="/">
                            <li class="font-bold">🏠 홈</li>
                        </a>
                        <li class="font-bold">📅 일정표</li>
                        <a href="/tasks">
                            <li>- 수행평가</li>
                        </a>
                        <li>- 신청 날짜</li>
                        <li>- 주요 행사</li>
                        <a href="/my_calendar">
                            <li class="mt-4 font-bold">📝 나의 캘린더</li>
                        </a>
                        <li class="mt-4 font-bold">⭐ 피드백</li>
                    </ul>
                </nav>

            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 p-6 transition-all duration-300 ease-in-out">

            <h1 class="text-3xl font-bold mb-6">🗓 나의 캘린더</h1>

            <div class="bg-white p-6 rounded-2xl shadow-lg w-full">
                <div id="calendar" class="w-full"></div>
            </div>

        </main>
    </div>

    <!-- 🔥 사이드바 JS -->
    <script>
        let isOpen = true;

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const content = document.getElementById("sidebarContent");
            const button = sidebar.querySelector("button");

            if (isOpen) {
                sidebar.style.width = "60px";
                content.style.display = "none";
                button.innerHTML = "››";
            } else {
                sidebar.style.width = "256px";
                content.style.display = "block";
                button.innerHTML = "‹‹";
            }

            isOpen = !isOpen;

            // 🔥 사이드바 토글 후 달력 재조정
            setTimeout(() => {
                if (calendar) {
                    calendar.updateSize();
                }
            }, 310);
        }
    </script>

    <!-- 🔥 캘린더 JS -->
    <script>
        let calendar;
        let userEvents = [];

        // 🔥 서버에서 받은 공휴일
        let holidays = {{ holidays | tojson }};

        fetch("/get_user_tasks")
            .then(res => res.json())
            .then(data => {
                userEvents = (data.tasks || []).map(task => ({
                    title: task.title,
                    start: task.date
                }));
            })
            .finally(() => initCalendar());

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                height: "auto",
                contentHeight: "auto",
                events: userEvents,

                // 날짜 숫자만
                dayCellContent: function (arg) {
                    return arg.date.getDate();
                },

                // 🔥 연도 바뀌면 공휴일 다시 가져오기
                datesSet: function (info) {
                    const year = info.start.getFullYear();

                    fetch(`/get_holidays?year=${year}`)
                        .then(res => res.json())
                        .then(data => {
                            holidays = data;
                            calendar.render();
                        });
                },

                // 🔥 날짜 + 공휴일 표시
                dayCellDidMount: function (info) {
                    const date = info.date;
                    const day = date.getDay();
                    let color = "";

                    if (day === 6) color = '#1e3a8a';
                    if (day === 0) color = '#b91c1c';

                    const dateStr =
                        date.getFullYear() + '-' +
                        String(date.getMonth() + 1).padStart(2, '0') + '-' +
                        String(date.getDate()).padStart(2, '0');

                    if (holidays[dateStr]) color = '#b91c1c';
                    if (color) info.el.style.color = color;

                    if (holidays[dateStr]) {
                        const span = document.createElement("div");
                        span.className = "holiday-name";
                        span.innerText = holidays[dateStr];

                        // 🔥 핵심 (날짜 바로 아래)
                        const top = info.el.querySelector('.fc-daygrid-day-top');

                        if (top) {
                            top.appendChild(span);
                        }
                    }
                }
            });

            calendar.render();
        }
    </script>

</body>

</html>
